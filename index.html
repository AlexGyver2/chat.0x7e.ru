<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Entropy</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        #canvas { 
            background: #111; 
            border: 2px solid #0f0; 
            width: 300px; 
            height: 300px;
            /* ЭТО САМАЯ ВАЖНАЯ СТРОКА ДЛЯ МОБИЛОК */
            touch-action: none; 
        }
        
        #status { font-size: 24px; margin-top: 20px; color: #0f0; }
    </style>
</head>
<body>

    <h2>Поводи пальцем по квадрату</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div id="status">Точек: 0 / 50</div>

    <script type="module">
        import { generateSecretKey } from 'https://unpkg.com/nostr-tools@2.7.2/lib/esm/index.js';

        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        let count = 0;

        // Функция обработки
        const handleMove = (e) => {
            // Для touch-событий берем координаты первого пальца
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            count++;
            status.innerText = `Точек: ${count} / 50`;
            canvas.style.backgroundColor = `rgb(${count*2 % 255}, 20, 20)`; // Мигаем цветом для обратной связи

            if (count >= 50) {
                status.innerText = "УСПЕХ! Ключ сгенерирован.";
                const key = generateSecretKey();
                console.log("Ключ есть:", key);
                alert("Ключ сгенерирован! В консоли или здесь все ок.");
            }
        };

        // Вешаем обработчики на все варианты касаний
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('mousemove', handleMove);
        
        console.log("Скрипт запущен");
    </script>
</body>
</html>
