<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Private Cryptochat</title>
    <style>
        :root { --bg: #050505; --accent: #00ff66; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas { background: #111; border: 1px solid var(--accent); cursor: crosshair; }
        .hidden { display: none !important; }
        .input-box { display: flex; flex-direction: column; gap: 10px; padding: 20px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; }
        button { background: var(--accent); color: #000; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Экран 1: Генерация ключа через рисование -->
<div id="entropy-overlay" class="overlay">
    <h2>Безопасная инициализация</h2>
    <p>Рисуй пальцем по экрану для создания ID</p>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div id="prog">0%</div>
</div>

<!-- Экран 2: Вход в комнату (Проверка ключа) -->
<div id="access-overlay" class="overlay hidden">
    <h2>Доступ в комнату</h2>
    <div class="input-box">
        <input id="access-key" type="text" placeholder="Введите ключ доступа">
        <button onclick="checkAccess()">Войти</button>
    </div>
</div>

<!-- Экран 3: Чат -->
<div id="chat-ui" class="hidden">
    <div id="messages" style="height: 80vh; overflow-y: scroll; padding: 10px;"></div>
    <div style="padding: 10px;">
        <input id="msg-input" placeholder="Сообщение...">
        <button onclick="send()">Отправить</button>
    </div>
</div>

<script type="module">
    import { generateSecretKey, getPublicKey, finalizeEvent, nip19 } from 'https://unpkg.com/nostr-tools@2.7.2/lib/esm/index.js';

    // !!! ТВОЙ СЕКРЕТ (Задай свою уникальную строку) !!!
    const MASTER_SECRET = "ТВОЙ_ОЧЕНЬ_СЕКРЕТНЫЙ_МАСТЕР_КЛЮЧ_123";
    const ROOM_ID = "private_room_001";

    let myPriv, myPub, accessKey;

    // 1. Энтропия
    const canvas = document.getElementById('canvas');
    let entropy = [];
    canvas.addEventListener('pointermove', async (e) => {
        if (entropy.length > 500) return;
        entropy.push(e.clientX, e.clientY);
        document.getElementById('prog').textContent = Math.round(entropy.length / 5) + "%";
        if (entropy.length >= 500) {
            const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(entropy.join('')));
            myPriv = new Uint8Array(hash);
            myPub = getPublicKey(myPriv);
            document.getElementById('entropy-overlay').classList.add('hidden');
            document.getElementById('access-overlay').classList.remove('hidden');
        }
    });

    // 2. Проверка доступа
    window.checkAccess = async () => {
        const inputKey = document.getElementById('access-key').value.trim();
        
        // Математика проверки: Hash(Master + PubKey + RoomID)
        const encoder = new TextEncoder();
        const data = encoder.encode(MASTER_SECRET + nip19.npubEncode(myPub) + ROOM_ID);
        const key = await crypto.subtle.importKey("raw", encoder.encode(MASTER_SECRET), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
        const signature = await crypto.subtle.sign("HMAC", key, data);
        const hashArray = Array.from(new Uint8Array(signature));
        const expectedKey = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);

        if (inputKey === expectedKey) {
            accessKey = inputKey;
            document.getElementById('access-overlay').classList.add('hidden');
            document.getElementById('chat-ui').classList.remove('hidden');
            initChat();
        } else {
            alert("Неверный ключ доступа!");
        }
    };

    // 3. Чат
    function initChat() {
        const ws = new WebSocket('wss://relay.damus.io');
        ws.onopen = () => ws.send(JSON.stringify(["REQ", "room", { kinds: [9], "#g": [ROOM_ID], limit: 20 }]));
        ws.onmessage = (e) => {
            const [type, id, event] = JSON.parse(e.data);
            if (type === "EVENT") {
                document.getElementById('messages').innerHTML += `<div>Anon: ${event.content}</div>`;
            }
        };
        window.send = () => {
            const text = document.getElementById('msg-input').value;
            const ev = finalizeEvent({kind: 9, created_at: Date.now()/1000, tags: [['g', ROOM_ID]], content: text}, myPriv);
            ws.send(JSON.stringify(["EVENT", ev]));
        };
    }
</script>
</body>
</html>
