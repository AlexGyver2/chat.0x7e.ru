<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: black; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        #box { width: 300px; height: 300px; background: red; }
    </style>
</head>
<body>
    <div id="box"></div>
    <h1 id="text">Тронь красный квадрат</h1>

    <script>
        // Проверка, работает ли JS вообще
        alert("Скрипт загрузился!");

        const box = document.getElementById('box');
        const text = document.getElementById('text');
        let counter = 0;

        // Обработчик касания
        box.addEventListener('touchmove', function(e) {
            e.preventDefault(); // Запрещаем прокрутку
            counter++;
            text.innerText = "Сработало! Счетчик: " + counter;
            box.style.background = "green";
        }, { passive: false });
    </script>
</body>
</html>
