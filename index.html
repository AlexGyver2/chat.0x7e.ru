<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Chat Setup</title>
    <!-- Загружаем библиотеку не как модуль, а как обычный скрипт -->
    <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; touch-action: none; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #box { width: 300px; height: 300px; border: 2px solid #0f0; display: flex; align-items: center; justify-content: center; text-align: center; }
        #log { font-size: 12px; color: #aaa; margin-top: 20px; width: 80%; }
    </style>
</head>
<body>
    <div id="box">Поводи пальцем здесь (0/50)</div>
    <div id="log">Загрузка...</div>

    <script>
        const box = document.getElementById('box');
        const log = document.getElementById('log');
        let counter = 0;

        // Ждем загрузку библиотеки Nostr
        window.onload = () => {
            log.innerText = "Библиотека загружена. Рисуй!";
        };

        box.addEventListener('touchmove', function(e) {
            e.preventDefault();
            counter++;
            box.innerText = "Считаем энтропию: " + counter + "/50";
            
            if (counter >= 50) {
                // Если библиотека загрузилась
                if (typeof NostrTools !== 'undefined') {
                    const key = NostrTools.generatePrivateKey();
                    const pub = NostrTools.getPublicKey(key);
                    box.style.background = "green";
                    box.innerText = "Ключ создан! Pub: " + pub.slice(0,10) + "...";
                    log.innerText = "Успех! Ключ сгенерирован и подписан.";
                } else {
                    log.innerText = "Ошибка: Библиотека не найдена!";
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
